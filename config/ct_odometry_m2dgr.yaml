odometry_mode: 1  # LIO = 0, LICO = 1

lidar_yaml: /m2dgr/lidar.yaml
imu_yaml: /m2dgr/imu.yaml
camera_yaml: /m2dgr/camera.yaml

# room_01.bag
# room_02.bag
# room_03.bag
bag_path: /path/to/xxx.bag
bag_start: 0.
bag_durr: -1


### SplineParams ###
t_add: 0.1  # [s] trajectory is updated every delta_t seconds, no adjustment needed
distance0: 0.03  # [s] the time duration corresponding to the first 4 control points, no adjustment needed
non_uniform: true  # true for non-uniform b-spline, false for uniform b-spline
division_coarse: 1  # if it is uniform, decide how many control points to place in every delta_t seconds, must be a non-zero integer


### OptimizationParams ###
t_begin_add_cam: 5.0  # [s] visual constraints will be added after the system has been successfully initialized for a while
lidar_iter: 2
use_lidar_scale: true  # scale the lidar weight
lidar_weight: 500.0
image_weight: 4.0
# imu：HFI-A9（150Hz）
# derived from data manual https://shop.taobotics.com/products/hfi-imu | https://github.com/SJTU-ViSYS/M2DGR/blob/main/calibration_results.txt
gyroscope_noise_density: 2.3417543020438883e-03
gyroscope_random_walk: 1.4428407712885209e-05                    
accelerometer_noise_density: 3.7686306102624571e-02
accelerometer_random_walk: 1.1416642385952368e-03              


### EvalutaionParams ###
is_evo_viral: false


### Gaussian-LIC ###
if_3dgs: true  # if sending data to back-end for incremental Gaussian mapping
if_3dgs_export: false  # write 3DGS training dataset directly to disk (lossless, no ROS transport)
gs_export_path: "/data/gs_export"  # only used when if_3dgs_export is true
lidar_skip: 1  # downsample: randomly select a LiDAR point every [lidar_skip] points