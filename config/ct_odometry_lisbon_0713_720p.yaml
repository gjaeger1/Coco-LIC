odometry_mode: 1  # LIO = 0, LICO = 1

lidar_yaml: /lissabon/org/lidar.yaml
imu_yaml: /lissabon/org/imu.yaml
camera_yaml: /lissabon/org/camera_1280x720_zed.yaml  # real ZED calib (native 1280x720, no resize)

bag_path: /path/to/xxx.bag
bag_start: 0.
bag_durr: -1


### SplineParams ###
t_add: 0.1
distance0: 0.03
non_uniform: true
division_coarse: 1


### OptimizationParams ###
t_begin_add_cam: 1.0
lidar_iter: 2
use_lidar_scale: true
lidar_weight: 500.0
image_weight: 40.0
gyroscope_noise_density: 3.45557556e-03
gyroscope_random_walk: 2.617993833e-07
accelerometer_noise_density: 2.425376259e-02
accelerometer_random_walk: 1.96e-06


### EvalutaionParams ###
is_evo_viral: false


### Gaussian-LIC ###
if_3dgs: false
if_3dgs_export: false
gs_export_path: "/data/gs_export"

loop_closure:
  enable: true
  shadow_mode: true
  detectors: [visual_bow, spatial]
  detector: scan_context             # legacy fallback (unused)
  min_index_gap: 20
  detection_stride: 1
  visual_bow:
    vocab_path: /home/ubuntu/Software/ORBvoc.txt
    num_features: 1000
    score_min: 0.015
    max_candidates: 3
  spatial:
    search_radius_m: 15.0
  verifier:
    icp_fitness_max: 0.3
    overlap_ratio_min: 0.6
    submap_half_size: 12
    max_correction_m: 10.0
  pgo:
    robust_kernel: cauchy
    odom_rotation_sigma_deg: 0.5
    odom_translation_sigma_m: 0.05
    rp_information_scale: 100.0
    backbone_dt_s: 0.4
    loop_robust_cauchy: 200.0
    loop_max_iterations: 200
    knot_prior_weight: 30.0
  log_dir: ""
  inject_false_loops: 0
lidar_skip: 10
